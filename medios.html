<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medios — Contrastar.cl</title>
  <style>
    /* Esto quita los bordes del iframe y hace que tu página de Google ocupe toda la pantalla de forma nativa */
    body, html { margin: 0; padding: 0; height: 100vh; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>
  <iframe src="https://script.google.com/macros/s/AKfycbwPI-Wod99FF47uUvks8d7Y5yHwuG_dxdPydrIRWo5uCxOoRr_nGGOooWTFujvHRMmA/exec"></iframe>
</body>
</html>
